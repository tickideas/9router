services:
  9router:
    build:
      context: .
      dockerfile: Dockerfile
    image: 9router:latest
    container_name: 9router
    restart: unless-stopped
    ports:
      - "${PORT:-20128}:20128"
    environment:
      # ── Required ────────────────────────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      INITIAL_PASSWORD: ${INITIAL_PASSWORD:?INITIAL_PASSWORD is required}

      # ── Runtime ─────────────────────────────────────────────────────────────
      NODE_ENV: production
      PORT: 20128
      DATA_DIR: /app/data

      # ── Security / ops ───────────────────────────────────────────────────────
      API_KEY_SECRET: ${API_KEY_SECRET:-}
      MACHINE_ID_SALT: ${MACHINE_ID_SALT:-}
      ENABLE_REQUEST_LOGS: ${ENABLE_REQUEST_LOGS:-false}
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-true}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      REQUIRE_API_KEY: ${REQUIRE_API_KEY:-false}

      # ── URLs (update to your public domain) ─────────────────────────────────
      BASE_URL: ${BASE_URL:-http://localhost:20128}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:20128}
      CLOUD_URL: ${CLOUD_URL:-https://9router.com}
      NEXT_PUBLIC_CLOUD_URL: ${NEXT_PUBLIC_CLOUD_URL:-https://9router.com}

      # ── Optional outbound proxy ──────────────────────────────────────────────
      # HTTP_PROXY: ${HTTP_PROXY:-}
      # HTTPS_PROXY: ${HTTPS_PROXY:-}
      # ALL_PROXY: ${ALL_PROXY:-}
      # NO_PROXY: ${NO_PROXY:-}
    volumes:
      - 9router_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:20128/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  9router_data:
    driver: local
