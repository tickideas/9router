services:
  9router:
    build:
      context: .
      dockerfile: Dockerfile
    image: 9router:latest
    restart: unless-stopped
    ports:
      - "20128"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      INITIAL_PASSWORD: ${INITIAL_PASSWORD}
      NODE_ENV: production
      PORT: "20128"
      DATA_DIR: /app/data
      API_KEY_SECRET: ${API_KEY_SECRET}
      MACHINE_ID_SALT: ${MACHINE_ID_SALT}
      ENABLE_REQUEST_LOGS: ${ENABLE_REQUEST_LOGS}
      OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE}
      REQUIRE_API_KEY: ${REQUIRE_API_KEY}
      BASE_URL: ${BASE_URL}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      CLOUD_URL: ${CLOUD_URL}
      NEXT_PUBLIC_CLOUD_URL: ${NEXT_PUBLIC_CLOUD_URL}
    volumes:
      - 9router_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:20128/api/init"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  9router_data:
